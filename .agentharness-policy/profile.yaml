# agentharness Bootstrap Policy Profile
#
# This file is the committed profile for agentharness's own bootstrap policy.
# Generated by: agentharness bootstrap discover + confirm
# Slice 6 dogfood — initial proposal (not yet activated)
#
# Schema: schemas/profile-v1.json
schema_version: 1
tier: production
state: proposal # not yet activated; awaiting Slice 6 Task 4 GitHub activation

requirements:
  # Commit gate: all quality checks must pass before committing
  - id: commit.python.ruff
    gate: commit
    capability: python.linting.ruff
    mode: strict
    scope:
      includes:
        - src/**
        - tests/**
        - tools/**

  - id: commit.python.mypy
    gate: commit
    capability: python.typing.mypy
    mode: strict
    scope:
      includes:
        - src/**

  # Push gate: test suite + coverage must pass
  - id: push.python.pytest
    gate: push
    capability: python.testing.pytest
    mode: strict
    scope:
      includes:
        - src/**
        - tests/**

  # CI gate: full harness CI must pass
  - id: ci.harness.check
    gate: ci
    capability: composite.check
    mode: strict
    scope:
      includes:
        - "**"

  # Completion gate: review + CI required before merge
  - id: completion.review
    gate: completion
    capability: github.review
    mode: strict
    scope:
      includes:
        - "**"
