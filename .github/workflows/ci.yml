name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck all shell scripts
        run: |
          shopt -s globstar nullglob
          scripts=(.github/hooks/prevent-trunk-commit tools/**/*.sh)
          if [ ${#scripts[@]} -eq 0 ]; then
            echo "No shell scripts found."
            exit 0
          fi
          shellcheck "${scripts[@]}"

  hook-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats-core
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
      - name: Run hook tests
        run: bats .github/hooks/tests/
      # harness-link.bats tests symlink creation and git config
      # These require filesystem isolation and git setup that's complex in CI
      # Tested manually; CI will add when sample integration project is added

  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check internal markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --offline
            '**/*.md'
          fail: true

  manifest-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify MANIFEST.md against actual files
        run: bash tools/verify-manifest.sh
