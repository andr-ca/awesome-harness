name: Release

# Publishes the npm package on a version tag push (see docs/RELEASING.md).
# Requires an NPM_TOKEN secret with publish rights for the
# "agentharness-toolkit" package (see docs/RELEASING.md's "npm publish"
# step for the setup this needs).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # fetch-depth: 0 — 'git merge-base --is-ancestor' below needs enough
      # history to actually determine ancestry, not just the tag commit
      # itself (the default shallow checkout would make that check vacuous).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Seed hash-verified runtime build artifacts
        run: bash tools/runtime/seed-runtime-artifacts.sh

      - name: Verify tag matches package.json version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag v$tag_version does not match package.json version $pkg_version"
            exit 1
          fi

      # P0-05: a matching tag/package.json version alone doesn't prove this
      # commit was ever actually tested — an accidentally- or maliciously-
      # placed tag on an untested commit could otherwise publish. Require
      # that the tagged commit is reachable from origin/main (not a stray
      # branch tip) and that main's own CI run for this exact commit passed.
      - name: Verify the tagged commit is on main and its CI passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tagged commit $GITHUB_SHA is not an ancestor of origin/main — refusing to publish." >&2
            exit 1
          fi
          echo "Ancestry OK: $GITHUB_SHA is on main."

          # Query ci.yml's own runs for this exact commit specifically,
          # rather than enumerating every check-run on the commit (Copilot
          # review, round 2): the latter would also catch this release run's
          # own still-in-progress check run, AND any unrelated workflow that
          # happens to share the commit — e.g. link-check-scheduled.yml is
          # deliberately allowed to be flaky/non-blocking (see its own
          # comment) and could coincidentally target the same SHA as main's
          # HEAD. Filtering to ci.yml's push-to-main runs is both narrower
          # and more precise: it's the one workflow this repo actually
          # treats as the merge/main gate.
          runs_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${GITHUB_SHA}&branch=main&event=push" --jq '.workflow_runs')"
          total="$(echo "$runs_json" | jq 'length')"
          if [ "$total" -eq 0 ]; then
            echo "No ci.yml push-to-main run found for $GITHUB_SHA — refusing to publish an unverified commit." >&2
            exit 1
          fi
          # Most recent run for this SHA is authoritative (a rerun after a
          # transient infra failure produces a newer run for the same SHA).
          latest_status="$(echo "$runs_json" | jq -r 'sort_by(.run_started_at) | last | .status')"
          latest_conclusion="$(echo "$runs_json" | jq -r 'sort_by(.run_started_at) | last | .conclusion')"
          if [ "$latest_status" != "completed" ] || [ "$latest_conclusion" != "success" ]; then
            echo "Latest ci.yml run for $GITHUB_SHA on main is $latest_status/$latest_conclusion, not completed/success — refusing to publish." >&2
            exit 1
          fi
          echo "CI OK: ci.yml's latest push-to-main run for $GITHUB_SHA passed."

      # P0-05: prove the artifact itself works, not just that its version
      # string matches — same pack/unpack/CLI-smoke-test CI already runs on
      # every PR (ci.yml's npm-package job), rerun here against the exact
      # tarball about to be published.
      - name: Pack, unpack, and smoke-test the CLI shim before publishing
        run: |
          set -euo pipefail
          npm pack
          TMP=$(mktemp -d)
          tar xzf agentharness-toolkit-*.tgz -C "$TMP"
          [ -f "$TMP/package/.claude/skills/agentic-loops/agent_loop.py" ]
          [ ! -L "$TMP/package/.claude/skills/agentic-loops/agent_loop.py" ]
          mkdir "$TMP/consumer"
          # A git repo, not just a bare directory (Copilot review, round 2):
          # --with-hook silently no-ops outside a git repo, so without this
          # the flag was never actually exercised by this smoke test.
          git -C "$TMP/consumer" init --quiet
          git -C "$TMP/consumer" -c user.email=ci@example.com -c user.name=ci commit --quiet --allow-empty -m init
          node "$TMP/package/bin/cli.js" init "$TMP/consumer" --skills agentic-loops --with-hook
          [ -f "$TMP/consumer/.claude/skills/agentic-loops/agent_loop.py" ]
          hooks_path="$(git -C "$TMP/consumer" config --get core.hooksPath)"
          [ -n "$hooks_path" ]
          rm -f agentharness-toolkit-*.tgz

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
