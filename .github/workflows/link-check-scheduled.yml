name: Scheduled link check

# P1-08: the PR-blocking markdown-links job in ci.yml runs --offline (path
# existence only) precisely so a flaky or slow third-party URL never blocks
# a merge. Real external links still need checking — just not on the
# merge-blocking path. Weekly is enough to catch link rot without being
# noisy; manual dispatch lets you run it on demand after editing links.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  link-check-online:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check all markdown links, including external URLs
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: >-
            --no-progress
            '**/*.md'
          fail: true
