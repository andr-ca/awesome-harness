    path: .github/workflows/link-check-scheduled.yml
    type: workflow
    purpose: Weekly online external-link validation, separate from the offline PR gate (P1-08)
  - asset: Release workflow
    path: .github/workflows/release.yml
    type: workflow
    purpose: Runs `npm publish` on a `v*` tag push; inert until `NPM_TOKEN` secret exists (P2-03)
  - asset: Automated issue analysis
    path: .github/workflows/issue-analysis.yml
    type: workflow
    purpose: "This-repo-only, opt-in: posts an explicitly-unverified opencode-generated YAML analysis when a maintainer labels an issue `needs-analysis`; relabels to `auto-analyzed`, never `analyzed` (#107)"
  - asset: Automated issue analysis retry
    path: .github/workflows/issue-analysis-retry.yml
    type: workflow
    purpose: "Reruns the issue-analysis workflow up to 2x on timeout/failure (bounded via run_attempt); separate workflow because a run can only be rerun once it's reached a completed state (#115)"
  - asset: OpenCode config
    path: opencode.json
    type: config
    purpose: Registers `.opencode/skills` as opencode's skill path, for the issue-analysis workflow above
  - asset: Markdownlint config
    path: .markdownlint-cli2.yaml
    type: config
    purpose: Rules enforced in CI's content-quality job; documents why purely-stylistic rules are off (P1-08)
  - asset: Content-quality checker
    path: tools/verify-content-quality.py
    type: script
    purpose: YAML validity, skill frontmatter schema, tested Python/bash/console-snippet syntax (P1-08, B3); `AGENTS.md` sync (P2-02); duplicate-policy number detection (B7); `MANIFEST.md` sync (B2)
  - asset: Content-quality checker tests
    path: tools/tests/test_verify_content_quality.py
    type: tests
    purpose: Tests for `check_duplicate_policy_numbers()` (real conflicts vs. measured-result/cross-reference/fenced-example false positives, B7) and `check_bash_snippets()`/`check_console_snippets()` (real syntax errors caught, B3)
  - asset: AGENTS.md generator
    path: tools/generate-agents-md.sh
    type: script
    purpose: Builds Codex's routing-only `AGENTS.md` from `CLAUDE.md` plus a name+description skill index (P2-02, redesigned P0-06 — full skill bodies load on demand from `.agents/skills/` instead)
  - asset: Shared adapter-generator library
    path: tools/lib/adapter-common.sh
    type: script
    purpose: Common helpers (heading demotion, frontmatter extraction, skill-index rendering, CLI-arg parsing) shared by every client-adapter generator instead of duplicated five times (cross-platform parity)
  - asset: GEMINI.md generator
    path: tools/generate-gemini-md.sh
    type: script
    purpose: Builds Gemini CLI's/Antigravity's routing-only `GEMINI.md` from `CLAUDE.md` plus a name+description skill index, same shape as `AGENTS.md` (cross-platform parity)
  - asset: GitHub Copilot instructions generator
    path: tools/generate-copilot-instructions.sh
    type: script
    purpose: Builds `.github/copilot-instructions.md` (routing rules + skill index) plus one `.github/instructions/<lang>.instructions.md` per `languages/<lang>/CONVENTIONS.md`, reusing that file's own `applyTo`/`description` frontmatter (cross-platform parity)
  - asset: Kilo Code rules generator
    path: tools/generate-kilo-rules.sh
    type: script
    purpose: Builds Kilo Code's auto-discovered `.kilo/rules/agentharness.md` from `CLAUDE.md` plus a name+description skill index, same shape as `AGENTS.md` (cross-platform parity)
  - asset: Cursor rules generator
    path: tools/generate-cursor-rules.sh
    type: script
    purpose: Builds Cursor's `.cursor/rules/agentharness-router.mdc` (always-on) plus one `.cursor/rules/<skill-name>.mdc` per skill (full body, no Agent Skills support to delegate to) — the one structurally different adapter (cross-platform parity)
  - asset: Codex custom-agent generator
    path: tools/generate-codex-agents.sh
    type: script
    purpose: Ports `.claude/agents/*.md` subagent definitions to Codex's TOML sub-agent-delegation format (`.codex/agents/*.toml`) — a different mechanism from `generate-agents-md.sh`'s routing/skill-index file; tool/permission scoping deliberately not translated (unverified per-platform)
  - asset: OpenCode custom-agent generator
    path: tools/generate-opencode-agents.sh
    type: script
    purpose: Ports `.claude/agents/*.md` subagent definitions to OpenCode's Markdown+YAML custom-agent format (`.opencode/agents/*.md`)
  - asset: Cursor custom-agent generator
    path: tools/generate-cursor-agents.sh
    type: script
    purpose: Ports `.claude/agents/*.md` subagent definitions to Cursor's own subagent format (`.cursor/agents/*.md`) — distinct from `generate-cursor-rules.sh`'s `.cursor/rules/*.mdc` (that ports skills, not custom agents)
  - asset: Kilo Code custom-agent generator
    path: tools/generate-kilo-agents.sh
    type: script
    purpose: Ports `.claude/agents/*.md` subagent definitions to Kilo Code's custom-subagent format (`.kilo/agents/*.md`) — distinct from `generate-kilo-rules.sh`'s routing rules file
  - asset: GitHub Copilot custom-agent generator
    path: tools/generate-copilot-agents.sh
    type: script
    purpose: Ports `.claude/agents/*.md` subagent definitions to Copilot's own custom-agent format (`.github/agents/*.agent.md`) — genuine isolated-context sub-agent delegation, distinct from `generate-copilot-instructions.sh`'s routing/skill mechanism; an earlier research pass wrongly classified Copilot as persona-only, corrected the same day (see docs/CLIENT_COMPATIBILITY.md)
  - asset: Gemini CLI custom-agent generator
    path: tools/generate-gemini-agents.sh
    type: script
    purpose: Ports `.claude/agents/*.md` subagent definitions to Gemini CLI's own custom-subagent format (`.gemini/agents/*.md`) — genuine isolated-context sub-agent delegation, distinct from `generate-gemini-md.sh`'s routing/skill mechanism; an earlier research pass wrongly classified Gemini CLI as having no delegation at all, corrected the same day (see docs/CLIENT_COMPATIBILITY.md)
