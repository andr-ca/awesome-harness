intro: |-
  Machine-readable-ish index of every real asset in this repo. One line per
  item: what it is, where it lives, when to read it. If it's not listed here,
  it doesn't exist yet — check [ROADMAP.md](ROADMAP.md) for planned work.
regeneration_note: |-
  Generated from `manifest.yaml` by `tools/generate-manifest.py` — edit
  that file, not this one, and run the generator to regenerate. CI fails if
  they drift (`check_manifest_md_sync()` in `tools/verify-content-quality.py`).
sections:
- name: Git / Workflow
  columns:
  - Asset
  - Path
  - Type
  - When to use
  assets:
  - asset: Branching strategy
    path: .github/BRANCHING_STRATEGY.md
    type: guide
    when_to_use: Before creating a branch; naming, worktrees, gitignore, secrets cleanup
  - asset: Committing guidelines
    path: .github/COMMITTING_GUIDELINES.md
    type: guide
    when_to_use: Before every commit; message format, atomic commits, agent workflow-completion rule
  - asset: Coding guidelines
    path: .github/CODING_GUIDELINES.md
    type: guide
    when_to_use: Before writing code in any language; naming, comments, testing mandate, definition of done
  - asset: PR template
    path: .github/pull_request_template.md
    type: template
    when_to_use: Auto-populated on PR creation
  - asset: gitignore template
    path: .github/.gitignore.template
    type: template
    when_to_use: '`cp` into a new project as `.gitignore`'
  - asset: prevent-trunk-commit hook
    path: .github/hooks/prevent-trunk-commit
    type: git hook
    when_to_use: The enforcement logic. Installed via `git config core.hooksPath .github/hooks` (done in this repo)
  - asset: pre-commit dispatcher
    path: .github/hooks/pre-commit
    type: git hook
    when_to_use: Required alongside the hook above — `core.hooksPath` only invokes a file literally named `pre-commit`; this execs `prevent-trunk-commit`
  - asset: pre-push test/coverage hook
    path: .github/hooks/pre-push
    type: git hook
    when_to_use: Runs bats + pytest suites and blocks the push if anything fails or Python coverage drops below 80%. Installed the same way as the hooks above (git only needs a file literally named `pre-push`)
