    path: .claude/agents/coding-guidelines-reviewer.md
    type: subagent
    when_to_use: Dispatch after finishing a change to check it against CODING_GUIDELINES.md's rigor tiers and COMPLETION_CHECKLIST.md — read-only, reports gaps, does not fix them
- name: Setup & Examples
  columns:
  - Asset
  - Path
  - Type
  - When to use
  assets:
  - asset: Harness lifecycle CLI
    path: tools/setup/harness-link.sh
    type: script
    when_to_use: "init/plan/status/doctor/audit/audit-prs/enforce-profile/generate-clients/update/uninstall; link/copy/submodule modes; state tracked in `<project>/.agentharness-state.json`"
  - asset: Block-managed instructions file installer
    path: tools/setup/block_installer.py
    type: utility
    when_to_use: "Pure functions for marker-block insert/replace/remove used by harness-link.sh's existing-surface integration (see docs/superpowers/specs/2026-07-17-existing-surface-integration-design.md)"
  - asset: Existing-surface install transaction orchestrator
    path: tools/setup/install_transaction.py
    type: script
    when_to_use: "Preflight planning, collision classification, crash-safe apply, and uninstall reversal for pre-existing consumer instructions files and generated surfaces"
  - asset: Local check entrypoint
    path: tools/check.sh
    type: script
    when_to_use: Runs every check CI runs (shellcheck, bats, ruff, mypy, pytest+coverage, manifest verify, skill-symlink integrity) in one command (P1-06)
  - asset: Agent lock manager
    path: tools/agent-lock.sh
    type: script
    when_to_use: Per-feature lock files for concurrent agent sessions — acquire/release/check/list/clean/suggest-branch
  - asset: Safe PR merge script
    path: tools/safe-pr-merge.sh
    type: script
    when_to_use: "Merge a PR safely while enforcing CLAUDE.md checklist: verify CI is green, detect automated reviewer, wait for review comments, verify all comments have replies, merge, poll post-merge CI"
  - asset: Structure analyzer
    path: tools/analyze_structure.py
    type: script
    when_to_use: Analyze project structure and generate .agentharness-guarded-paths.json; also --recommend for early-stage projects
  - asset: File placement check
    path: tools/check-file-placement.sh
    type: script
    when_to_use: Pre-commit hook check — blocks staged files in guarded paths; wired into .github/hooks/pre-commit alongside trunk protection
  - asset: Completion gate script
    path: tools/check-completion.sh
    type: script
    when_to_use: Run before declaring work done — verifies lint, types, tests, coverage, content quality. Exit 0 = complete; exit 1 = incomplete
  - asset: Completion gate hook (Copilot)
    path: .github/hooks/completion-gate.json
    type: hook
    when_to_use: Copilot Stop hook — prevents agents from stopping until check-completion.sh passes
  - asset: Completion gate hook (Claude Code)
    path: .claude/settings.json
    type: hook
    when_to_use: Claude Code Stop hook — same enforcement as the Copilot hook
  - asset: Skill-symlink verifier
    path: tools/verify-skill-symlinks.sh
    type: script
    when_to_use: Verifies `.agents/skills/` stays 1:1 with `.claude/skills/` — every Agent-Skills-standard tool (Codex, Copilot, Gemini, ...) reads the symlinks, so drift silently hides a skill from them while Claude still sees it
  - asset: Pinned dev/CI toolchain
    path: requirements-dev.txt
    type: config
    when_to_use: Exact pinned versions of pytest/ruff/mypy/etc. — install after the separate hash-locked runtime requirements (P1-06)
  - asset: Wheel-only CI runtime lock
    path: requirements-ci-runtime.lock
    type: config
    when_to_use: Hash-closed PyYAML and fastjsonschema wheel installation for Python 3.12/3.14 CI jobs; versions must match requirements-runtime.lock
  - asset: Minimal content-quality runtime lock
    path: requirements-ci-content.lock
    type: config
    when_to_use: Hash-closed PyYAML-only wheel installation for the content-quality CI job
  - asset: Runtime artifact cache seeder
    path: tools/runtime/seed-runtime-artifacts.sh
    type: script
    when_to_use: Portable shell entrypoint before building or packaging the Python runtime zipapp in a clean checkout
  - asset: Authenticated runtime artifact acquisition
    path: tools/runtime/seed-runtime-artifacts.py
    type: script
    when_to_use: Downloads fixed official artifacts as inert bytes, strictly parses requirements-runtime.lock, promotes each file atomically under a cache lock, and fails closed if a mixed generation remains
  - asset: Bootstrap policy core (⚠ EXPERIMENTAL — unreleased; not wired into public CLI)
    path: src/agentharness/
    type: package
    when_to_use: Deterministic Python policy core (bootstrap, gates, profiles, plugins) — experimental and unreleased; the public npm launcher does not invoke it. See docs/STATUS.md for the version split and E1/E2 in the 2026-07-16 launch-readiness plan
  - asset: Canonical runtime requirements parser
    path: src/agentharness/runtime_requirements.py
    type: utility
    when_to_use: Shared strict parser used by runtime zipapp building and authenticated artifact seeding; rejects duplicate, extra, malformed, or version-drifted lock declarations
  - asset: Sample project
    path: examples/sample-project/
    type: project
    when_to_use: Blank/generic fixture; demonstrates harness integration, validates INTEGRATION.md commands work
  - asset: Integration verification
    path: examples/sample-project/verify.sh
    type: script
    when_to_use: Checks that skills, hooks, and guidelines are properly integrated
  - asset: Python fixture
    path: examples/python-project/
    type: project
    when_to_use: Realistic Python consumer (pre-existing `.gitignore`); CI-verified across all install modes
  - asset: TypeScript fixture
    path: examples/typescript-project/
    type: project
    when_to_use: Realistic TypeScript consumer (pre-existing `.gitignore`); CI-verified across all install modes
  - asset: Go fixture
    path: examples/go-project/
    type: project
    when_to_use: Realistic Go consumer (pre-existing `.gitignore`); CI-verified across all install modes
  - asset: npm package manifest
    path: package.json
    type: config
    when_to_use: '`files` allowlist for `npm publish`; `bin.agentharness` entry point; see `docs/RELEASING.md#npm-distribution` for what''s built vs. not-yet-published'
  - asset: npm CLI shim
    path: bin/cli.js
    type: script
    when_to_use: Execs `tools/setup/harness-link.sh` from an npm/npx install; fails clearly if `bash`/`python3` are missing
  - asset: Symlink materializer
    path: tools/release/materialize-skill-symlinks.py
    type: script
    when_to_use: '`prepack`/`postpack` hook — npm tarballs don''t preserve symlinks, so bundled-resource symlinks (e.g. `agentic-loops`''s) are copied to real files before packing, then restored via `git checkout`'
  - asset: Manifest source of truth
    path: manifest.yaml
    type: config
    when_to_use: Structured source MANIFEST.md is generated from (B2) — edit this, not MANIFEST.md directly
  - asset: MANIFEST.md generator
    path: tools/generate-manifest.py
    type: script
    when_to_use: Renders MANIFEST.md from manifest.yaml; drift-checked in CI the same way tools/generate-agents-md.sh is (B2)
